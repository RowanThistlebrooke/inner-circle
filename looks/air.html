      <defs>
        <linearGradient id="vrMtFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d1a17" stop-opacity="0" />
          <stop offset="55%" stop-color="#0d1a17" stop-opacity=".55" />
          <stop offset="100%" stop-color="#0d1a17" stop-opacity=".95" />
        </linearGradient>
        <linearGradient id="vrMtNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#050a09" stop-opacity=".4" />
          <stop offset="60%" stop-color="#050a09" stop-opacity=".95" />
          <stop offset="100%" stop-color="#050a09" stop-opacity="1" />

  </div>
  <div class="air-particles" id="vrParticles" aria-hidden="true"></div>
  <div class="air-grain" aria-hidden="true"></div>

<!-- the drift particles, generated (paste in your script) -->
<script>
// atmosphere particles (VitalsDashboard's drift field, same random spread)
;(function () {
  var root = document.getElementById('airParticles')
  if (!root || reduceMotion) return
  for (var i = 0; i < 26; i++) {
    var s = document.createElement('span')
    s.style.left = (Math.random() * 100) + '%'
    s.style.top = (60 + Math.random() * 40) + '%'
    var size = 1.2 + Math.random() * 1.2
    s.style.width = s.style.height = size + 'px'
    var d = 22 + Math.random() * 28
    s.style.animationDuration = d + 's'
    s.style.animationDelay = (-Math.random() * d) + 's'
    s.style.setProperty('--dx', (Math.random() * 30 - 15) + 'px')
    s.style.setProperty('--dy', '-' + (60 + Math.random() * 50) + 'vh')
    root.appendChild(s)
  }
})()
</script>
